<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Battle Game</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<h1>🎲 Dice Battle Game</h1>

<div class="game">

  <!-- PLAYERS ROW -->
  <div class="players-row">

    <!-- PLAYER 1 -->
    <div class="player player1">
      <div class="p1">PLAYER 1</div>
      <div class="dice">
        <img id="dice1" src="./assets/red-1.png">
      </div>
      <p>Dice: <span id="score1">0</span></p>
    </div>

    <div class="vs">VS</div>

    <!-- PLAYER 2 -->
    <div class="player player2">
      <div class="p2">PLAYER 2</div>
      <div class="dice">
        <img id="dice2" src="./assets/green-1.png">
      </div>
      <p>Dice: <span id="score2">0</span></p>
    </div>

  </div>

  <!-- BET INPUT -->
  <div class="bet-box">
    <input type="number" id="bet" placeholder="💰 Enter coins" />
  </div>

  <!-- BUTTON -->
  <button id="roll">🎲 Roll Dice</button>

  <hr style="margin:40px 20px; opacity:0.2;">

  <!-- TOTALS -->
  <div class="totals">
    <div>Player 1: <span id="p1-total">0</span></div>
    <div>Player 2: <span id="p2-total">0</span></div>
  </div>

  <!-- COINS -->
  <p class="coins">💰 Coins: <span id="coins">100</span></p>

  <!-- RESULT -->
  <p class="result">Roll to start</p>

</div>

<div id="coin-animation"></div>
<script src="main.js"></script>

</body>
</html>
